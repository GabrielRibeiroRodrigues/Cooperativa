{% extends 'core/base.html' %}

{% block title %}Login - Cooperativa Rural{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card">
            <div class="card-header text-center bg-success text-white">
                <h4><i class="fas fa-sign-in-alt me-2"></i>Entrar</h4>
            </div>
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label for="username" class="form-label">Nome de usuário</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" name="password" required>
                    </div>
                    <div class="d-grid">
                        <button type="submit" class="btn btn-success">
                            <i class="fas fa-sign-in-alt me-2"></i>Entrar
                        </button>
                    </div>
                </form>
            </div>
            <div class="card-footer text-center py-3">
                <p class="mb-2 text-muted">Não tem uma conta? Registre-se como:</p>
                <div class="d-flex justify-content-center gap-2">
                    <a href="{% url 'registro_contratante' %}" class="btn btn-sm btn-outline-success">
                        <i class="fas fa-briefcase me-1"></i>Contratante
                    </a>
                    <a href="{% url 'registro_trabalhador' %}" class="btn btn-sm btn-outline-success">
                        <i class="fas fa-tractor me-1"></i>Trabalhador
                    </a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
