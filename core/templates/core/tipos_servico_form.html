{% extends 'core/base.html' %}

{% block title %}Tipos de Serviço{% endblock %}

{% block content %}
<div class="card col-lg-7 mx-auto">
    <div class="card-header">
        <h1 class="h5 mb-0">{{ titulo }}</h1>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button class="btn btn-success" type="submit">Salvar</button>
            <a class="btn btn-outline-secondary ms-2" href="{% url 'lista_tipos_servico' %}">Cancelar</a>
        </form>
    </div>
</div>
{% endblock %}
